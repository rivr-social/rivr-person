services:
  rivr-person:
    image: rivr-person:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # Autobot / MCP — set a strong random token to enable AI agent access.
      # Generate with: openssl rand -hex 32
      # AIAGENT_MCP_TOKEN: "replace-with-a-long-random-token"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)throw new Error(String(r.status));}).then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    ports:
      - "3000:3000"
